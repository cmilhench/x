<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Client</title>
  </head>
  <body>
    <h2>WebSocket Client</h2>

    <div>
      <label for="message">Message:</label>
      <input type="text" id="message" placeholder="Enter your message">
    </div>

    <div>
      <button onclick="sendBroadcast()">Broadcast Message</button>
      <button onclick="sendRequest()">Send Request</button>
    </div>

    <h3>Messages:</h3>
    <div id="messages"></div>

    <script>
        const ws = new WebSocket("ws://localhost:8080/ws");
        ws.binaryType = "arraybuffer";

        ws.onopen = function() {
            console.debug("Connected to WebSocket server");
        };

        ws.onmessage = function(event) {
            const messagesDiv = document.getElementById("messages");
            const message = document.createElement("p");
            const arrayBuffer = event.data;
            const msg = new TextDecoder("utf-8").decode(arrayBuffer);
            m = Parse(msg)
            message.textContent = "Received: " + m.Raw;
            messagesDiv.appendChild(message);
        };

        ws.onclose = function() {
            console.debug("Disconnected from WebSocket server");
        };

        ws.onerror = function(error) {
            console.error("WebSocket error:", error);
        };

        function sendBroadcast() {
            const encoder = new TextEncoder();
            const messageInput = document.getElementById("message");
            message = Message('user@host', 'PRIVMSG', '#channel', messageInput.value)
            const binaryMessage = encoder.encode(message);
            ws.send(binaryMessage);
            messageInput.value = "";
        }

        function sendRequest() {
            const encoder = new TextEncoder();
            const messageInput = document.getElementById("message");
            message = Message('user@host', 'JOIN', '#channel', messageInput.value)
            const binaryMessage = encoder.encode(message);
            ws.send(binaryMessage);
            messageInput.value = "";
        }

    </script>
    <script>
      function Message(prefix, command, params, trailing) {
        let result = "";
        if (prefix) {
          result += `:${prefix} `;
        }
        result += command;
        if (params) {
          result += ` ${params}`;
        }
        if (trailing) {
          result += ` :${trailing}`;
        }
        return result;
      }
      function Parse(line) {
        line = line.replace(/\r$/, "");
        line = line.replace(/\r\n$/, ""); 
        const orig = line;
        const message = {
          Raw: orig,
          Prefix: "",
          Command: "",
          Params: "",
          Trailing: ""
        };
        // Prefix
        if (line[0] === ':') {
          const i = line.indexOf(" ");
          message.Prefix = line.substring(1, i);
          line = line.substring(i + 1);
        }
        // Command
        let i = line.indexOf(" ");
        if (i === -1) {
          i = line.length;
        }
        message.Command = line.substring(0, i);
        line = line.substring(i);
        // Params
        i = line.indexOf(" :");
        if (i === -1) {
          i = line.length;
        }
        if (i !== 0) {
          message.Params = line.substring(1, i);
        }
        // Trailing
        if (line.length - i > 2) {
          message.Trailing = line.substring(i + 2);
        }
        return message;
      }
    </script>
  </body>
</html>
